server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text-like assets. Vite's hashed JS/CSS bundles benefit a lot.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml;

    # Long cache for content-hashed assets emitted by Vite under /assets/.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML shell.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — safe even for our hash-based routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
